<h2>Available Plugins</h2>

<div class="plugin-list">
  {{#each plugins}}
  <div class="plugin">
    <div class="plugin-header">
      <span class="plugin-title">{{name}}</span>
      {{#if version}}
      <span class="plugin-version">v{{version}}</span>
      {{/if}}
    </div>
    {{#if author}}
    <div class="plugin-author">by {{author}}</div>
    {{/if}}
    {{#if description}}
    <p class="plugin-description">{{description}}</p>
    {{/if}}
    <a class="plugin-link" href="{{url}}/index.html">View details →</a>
  </div>
  {{/each}}
</div>
