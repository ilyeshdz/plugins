<a href="{{url}}" class="plugin-item">
  <div class="plugin-header">
    <span class="plugin-name">{{name}}</span>
    <span class="plugin-badge">plugin</span>
  </div>
  <div class="plugin-desc">{{>description}}</div>
  <div class="plugin-url-row">
    <span class="plugin-url url-text"></span>
    <button class="copy-btn" onclick="copyUrl(this)">
      <svg
        width="10"
        height="10"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path
          d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
        ></path>
      </svg>
      copy
    </button>
  </div>
</a>
